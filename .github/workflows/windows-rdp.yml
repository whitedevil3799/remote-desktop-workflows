name: WINDOWS RDP - CLOUDFLARE
on:
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 9999

    steps:
      - name: Setup Cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Enable Windows RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          Write-Host "✅ RDP Enabled Successfully!"

      - name: Set Administrator Password
        run: |
          Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "P@ssw0rd123!" -Force)
          Write-Host "✅ Password Configured!"

      - name: Start Cloudflare Tunnel
        run: |
          Write-Host "============================================"
          Write-Host "🚀 WINDOWS RDP - CLOUDFLARE TUNNEL"
          Write-Host "============================================"
          Write-Host ""
          Start-Process -NoNewWindow -FilePath "cloudflared" -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardOutput "stdout.log" -RedirectStandardError "stderr.log"
          Write-Host "⏳ Waiting for tunnel to establish..."
          Start-Sleep -Seconds 20
          $stdout = Get-Content "stdout.log" -ErrorAction SilentlyContinue
          $stderr = Get-Content "stderr.log" -ErrorAction SilentlyContinue
          $allLogs = $stdout + $stderr
          $url = $allLogs | Select-String -Pattern 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' | Select-Object -First 1
          $tcpUrl = $allLogs | Select-String -Pattern 'tcp://[a-zA-Z0-9-]+\.trycloudflare\.com:\d+' | Select-Object -First 1
          Write-Host ""
          Write-Host "============================================"
          Write-Host "🔗 CLOUDFLARE URL: $($url.Matches.Value)"
          Write-Host "🔗 TCP ADDRESS: $($tcpUrl.Matches.Value)"
          Write-Host ""
          Write-Host "📋 CONNECTION DETAILS:"
          Write-Host "   USERNAME: runneradmin"
          Write-Host "   PASSWORD: P@ssw0rd123!"
          Write-Host "   OS: Windows Server 2022"
          Write-Host "   CPU: 4 cores"
          Write-Host "   RAM: 16GB"
          Write-Host "============================================"
          Write-Host ""
          Write-Host "📱 For Mobile RDP: Use the TCP ADDRESS above"
          Write-Host "   Example: 0.tcp.ngrok.io:12345 format"
          Write-Host ""

      - name: Keep Session Alive
        run: |
          Write-Host "⏳ Session Active - Keeping alive..."
          while ($true) {
            Start-Sleep -Seconds 60
            Write-Host "✓ Active - $(Get-Date -Format 'HH:mm:ss')"
          }
